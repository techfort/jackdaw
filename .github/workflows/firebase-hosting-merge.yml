name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: npm ci
      - run: mise run lint
      - run: mise run test

  build_and_deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - run: npm ci
      - name: Set build env
        run: |
          echo "VITE_APP_VERSION=$(node -p "require('./package.json').version")+$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "VITE_SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
          echo "VITE_SUPABASE_PUBLISHABLE_KEY=${{ secrets.SUPABASE_PUBLISHABLE_KEY }}" >> $GITHUB_ENV
          echo "VITE_R2_WORKER_URL=${{ secrets.R2_WORKER_URL }}" >> $GITHUB_ENV
      # build-prod sets VITE_STORAGE_MODE=firebase inline (overrides mise.toml default)
      - run: mise run build-prod
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JACKDAW_E862A }}
          channelId: live
          projectId: jackdaw-e862a
