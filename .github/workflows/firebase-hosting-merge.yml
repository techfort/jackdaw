name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run test
      - name: Set build env
        run: |
          echo "VITE_APP_VERSION=$(node -p "require('./package.json').version")+$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          echo "VITE_STORAGE_MODE=firebase" >> $GITHUB_ENV
      - run: npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JACKDAW_E862A }}
          channelId: live
          projectId: jackdaw-e862a
